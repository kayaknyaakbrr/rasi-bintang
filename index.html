<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malam Estetika - Scorpion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. Langit Malam & Scorpion -->
    <div class="sky" id="sky">
        <!-- Bulan Cerah -->
        <div class="moon"></div>
        
        <!-- Scorpion Constellation -->
        <div class="constellation" id="scorpio">
            <div class="scorp-star s1"></div>
            <div class="scorp-line l1"></div>
            <div class="scorp-star s2"></div>
            <div class="scorp-line l2"></div>
            <div class="scorp-star s3"></div>
            <div class="scorp-line l3"></div>
            <div class="scorp-star s4"></div>
            <div class="scorp-line l4"></div>
            <div class="scorp-star s5"></div>
            <div class="scorp-line l5"></div>
            <div class="scorp-star s6"></div>
            <div class="scorp-line l6"></div>
            <div class="scorp-star s7"></div>
            <div class="scorp-line l7"></div>
            <div class="scorp-star s8"></div>
            <div class="scorp-line l8"></div>
            <div class="scorp-star s9"></div>
            <div class="antares"></div>
        </div>
        
        <!-- Teks Scorpion -->
        <div class="constellation-label">
            <span class="label-text">SCORPION</span>
            <div class="pointer-arrow"></div>
        </div>
    </div>

    <!-- 2. Manusia Hitam -->
    <div class="human-container">
        <svg viewBox="0 0 200 450" xmlns="http://www.w3.org/2000/svg">
            <!-- Bayangan -->
            <ellipse cx="100" cy="445" rx="55" ry="12" fill="rgba(0,0,0,0.5)"/>
            <!-- Kaki Kiri -->
            <path d="M90 300 L85 390 L100 400 L105 305" fill="#050505"/>
            <!-- Kaki Kanan -->
            <path d="M110 300 L115 390 L100 400 L95 305" fill="#080808"/>
            <!-- Sepatu -->
            <path d="M85 390 L100 400 L105 405 L80 405 Z" fill="#020202"/>
            <path d="M100 400 L115 390 L120 405 L105 405 Z" fill="#020202"/>
            <!-- Celana -->
            <path d="M75 210 L125 210 L130 305 L70 305 Z" fill="#050505"/>
            <path d="M75 210 L75 250 L125 250 L125 210" fill="#080808"/>
            <!-- Jas/Hoodie -->
            <path d="M60 120 L140 120 L150 230 L50 230 Z" fill="#0a0a0a"/>
            <!-- Tangan di Saku -->
            <path d="M70 145 L55 190 L70 195 L85 150 Z" fill="#0a0a0a"/>
            <path d="M130 145 L145 190 L130 195 L115 150 Z" fill="#0a0a0a"/>
            <!-- Saku Depan -->
            <path d="M75 200 L125 200 L125 220 L75 220 Z" fill="#0c0c0c"/>
            <!-- Kapuchon -->
            <path d="M60 95 Q60 40 100 40 Q140 40 140 95 L140 125 L60 125 Z" fill="#080808"/>
            <!-- Leher -->
            <rect x="85" y="115" width="30" height="15" fill="#030303"/>
        </svg>
    </div>

    <!-- 3. Pohon Hitam -->
    <div class="tree-container">
        <svg viewBox="0 0 150 380" xmlns="http://www.w3.org/2000/svg">
            <!-- Batang -->
            <path d="M75 380 L65 280 Q60 220 70 170 L80 170 Q90 220 85 280 L75 380" fill="#0a0a0a"/>
            <ellipse cx="75" cy="300" rx="20" ry="40" fill="#0a0a0a"/>
            <!-- Cabang -->
            <path d="M75 220 Q40 200 25 170" stroke="#0a0a0a" stroke-width="8" fill="none"/>
            <path d="M75 240 Q100 220 120 190" stroke="#0a0a0a" stroke-width="8" fill="none"/>
            <path d="M75 180 Q55 150 40 130" stroke="#0a0a0a" stroke-width="5" fill="none"/>
            <path d="M75 160 Q95 130 115 110" stroke="#0a0a0a" stroke-width="5" fill="none"/>
            <!-- Daun -->
            <ellipse class="tree-leaves" cx="75" cy="90" rx="55" ry="60" fill="#0a0a0a"/>
            <ellipse class="tree-leaves" cx="50" cy="120" rx="35" ry="40" fill="#080808"/>
            <ellipse class="tree-leaves" cx="100" cy="115" rx="35" ry="40" fill="#0a0a0a"/>
            <ellipse class="tree-leaves" cx="35" cy="150" rx="25" ry="30" fill="#080808"/>
            <ellipse class="tree-leaves" cx="115" cy="145" rx="25" ry="30" fill="#0a0a0a"/>
            <ellipse class="tree-leaves" cx="75" cy="160" rx="40" ry="30" fill="#050505"/>
            <ellipse class="tree-leaves" cx="60" cy="65" rx="18" ry="20" fill="#0a0a0a"/>
            <ellipse class="tree-leaves" cx="95" cy="60" rx="20" ry="22" fill="#080808"/>
        </svg>
    </div>

    <!-- 4. Bukit & Rumput Lebat -->
    <div class="hill">
        <div class="grass-field" id="grassField"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
